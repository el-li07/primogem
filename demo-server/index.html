<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primogem Demo Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="/favicon.ico" />
    <style>
        :root {
            --page-bg: #121212;
            --card-bg: #1e1e1e;
            --accent-green: #00c853;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --border-color: #333333;
        }

        body {
            background-color: var(--page-bg);
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
        }

        .form-control {
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            color: #ffffff !important;
        }
        .form-control::placeholder { color: #888; }
        .form-control:focus {
            background-color: #333;
            border-color: var(--accent-green);
            color: white;
            box-shadow: 0 0 8px rgba(0, 200, 83, 0.3);
        }

        #login-section {
            max-width: 400px;
            margin: 100px auto;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .header-panel {
            background-color: #1a1a1a;
            padding: 1rem 2rem;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-block { display: flex; align-items: center; gap: 15px; }
        .app-logo { width: 45px; height: 45px; object-fit: contain; }

        .doc-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1rem;
            transition: 0.2s;
        }
        .doc-card:hover { border-color: var(--accent-green); }

        h5 {
            color: var(--text-main) !important;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .doc-title, .fw-bold {
            color: var(--text-main) !important;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .card-body, .doc-card div {
            color: var(--text-main);
        }

        .btn-green { background: var(--accent-green); color: white; border: none; font-weight: 600; }
        .btn-green:hover { background: #00a040; color: white; }
        .btn-outline-green { border: 1px solid var(--accent-green); color: var(--accent-green); }
        .btn-outline-green:hover { background: var(--accent-green); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h3 class="text-center mb-4">Primogem <span style="color: var(--accent-green)">Portal</span></h3>
        <input type="text" id="username" class="form-control mb-3" placeholder="Логин">
        <input type="password" id="password" class="form-control mb-4" placeholder="Пароль">
        <button class="btn btn-green w-100 py-2" onclick="login()">ВХОД</button>
    </div>

    <div id="dashboard" class="hidden">
        <div class="header-panel shadow-lg mb-5">
            <div class="logo-block">
                <img src="http://localhost:8001/logo.png" alt="Logo" class="app-logo">
                <h4 class="m-0">Добро пожаловать, <span id="user-display-name" style="color: var(--accent-green)">...</span>!</h4>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Выйти</button>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8" id="file-list"></div>
        </div>
    </div>
</div>

<script>
    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        try {
            const response = await fetch('http://localhost:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('full_name', data.user_info.full_name);
                showDashboard();
            } else { alert('Ошибка входа'); }
        } catch (e) { alert('Сервер авторизации не отвечает'); }
    }

    async function loadDocuments() {
        const token = localStorage.getItem('access_token');
        try {
            const response = await fetch('http://localhost:8001/documents', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.status === 401) { logout(); return; }
            const data = await response.json();
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            data.documents.forEach(doc => {
                const editBtn = doc.can_edit 
                    ? `<button class="btn btn-outline-green btn-sm" onclick="editFile(${doc.id})">✏️ Правка</button>`
                    : `<button class="btn btn-sm text-muted" disabled style="background:#252525; border:1px solid #333;">🔒 Чтение</button>`;
                list.innerHTML += `
                    <div class="card doc-card p-3 shadow-sm">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="fw-bold">${doc.name}</div>
                                <small class="text-muted">Владелец: ${doc.owner}</small>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-dark btn-sm" onclick="alert('Файл: ${doc.name}\\n\\n${doc.content}')">👁️</button>
                                ${editBtn}
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { console.error("Ошибка загрузки"); }
    }

    async function editFile(id) {
        const token = localStorage.getItem('access_token');
        const response = await fetch(`http://localhost:8001/documents/${id}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) alert("✅ Документ изменен");
        else alert("❌ Отказано");
    }

    function showDashboard() {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('user-display-name').innerText = localStorage.getItem('full_name');
        loadDocuments();
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    if (localStorage.getItem('access_token')) showDashboard();
</script>
</body>
</html>
